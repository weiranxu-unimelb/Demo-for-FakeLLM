services:
  backend:
    build:
      context: ./backend
    environment:
      # SQLite 数据库持久化到 Docker volume，重建容器不丢失数据
      - DATABASE_URL=sqlite:////data/app.db
      # ChromaDB 连接地址
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      # 模型
      - MODEL_NAME=qwen2.5vl:7b # 用于本地调试
      # - MODEL_NAME=qwen2.5vl:32b  # 用于生产
    volumes:
      - backend_data:/data # SQLite 持久化
    ports:
      - "8000:8000"
    depends_on:
      - chromadb

  # 专业向量数据库：RAG 语义检索的核心工具
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # 前端在容器内通过 nginx 反代 /api 到 backend
        - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    ports:
      - "5173:80"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [ gpu ]
    # 如果没有GPU，或者在Mac上，可以移除 deploy 部分。由于当前是演示，可以先保留或者注释掉GPU支持。
    # 对于 macOS Docker Desktop 默认不支持直通 GPU 给 Linux 容器（除非特定配置），所以这里可以先不强制要求 nvidia-docker。
    # 简化版：移除 deploy 块以确保在任意机器上至少能用 CPU 跑（虽然慢）。
    # 这里先不加 deploy 块，或者提示用户如果要用到英伟达 GPU 需要安装 nvidia-container-toolkit。

    # =====================================================================
    # 以下两个服务（shadowsocks + ngrok）用于【公网穿透】场景
    # 当部署在国企内网时不需要，已注释掉。如需远程访问，取消以下注释并配置 .env
    # =====================================================================

    # shadowsocks:
    #   image: acrisliu/shadowsocks-libev:latest
    #   container_name: shadowsocks
    #   environment:
    #     - SERVER_PORT=8388
    #     - PASSWORD=fakellm-demo-pwd   # 客户端连接密码
    #     - METHOD=aes-256-gcm
    #     - ARGS=--plugin v2ray-plugin --plugin-opts "server"
    #   ports:
    #     - "8388:8388"
    #   restart: unless-stopped

    # ngrok:
    #   image: ngrok/ngrok:latest
    #   container_name: ngrok
    #   restart: unless-stopped
    #   environment:
    #     - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}  # 在 .env 文件中配置
    #   command: "http shadowsocks:8388 --domain=${NGROK_DOMAIN}"
    #   depends_on:
    #     - shadowsocks

volumes:
  ollama_data:
  chroma_data: # ChromaDB 向量数据持久化
  backend_data: # SQLite 数据库持久化（用户账号、知识库文档）
