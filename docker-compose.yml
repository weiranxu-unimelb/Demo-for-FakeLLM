services:
  backend:
    build:
      context: ./backend
    environment:
      # 默认用容器内 SQLite；生产建议改成 PostgreSQL（见 README）
      - DATABASE_URL=sqlite:////app/app.db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # 前端在容器内通过 nginx 反代 /api 到 backend
        - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    ports:
      - "5173:80"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [ gpu ]
    # 如果没有GPU，或者在Mac上，可以移除 deploy 部分。由于当前是演示，可以先保留或者注释掉GPU支持。
    # 对于 macOS Docker Desktop 默认不支持直通 GPU 给 Linux 容器（除非特定配置），所以这里可以先不强制要求 nvidia-docker。
    # 简化版：移除 deploy 块以确保在任意机器上至少能用 CPU 跑（虽然慢）。
    # 这里先不加 deploy 块，或者提示用户如果要用到英伟达 GPU 需要安装 nvidia-container-toolkit。

    # 提供代理服务（替代VPN），通过 WebSocket 插件使用 HTTP/HTTPS 端口
    # 这允许我们使用 Ngrok 的"免费 HTTP 静态域名"来穿透纯 TCP 代理流量
  shadowsocks:
    image: acrisliu/shadowsocks-libev:latest
    container_name: shadowsocks
    environment:
      - SERVER_PORT=8388
      - PASSWORD=fakellm-demo-pwd # 客户端连接密码
      - METHOD=aes-256-gcm
      - ARGS=--plugin v2ray-plugin --plugin-opts "server"
    ports:
      - "8388:8388"
    restart: unless-stopped

  # 内网穿透服务：将本地的 WebSocket 代理端口暴露到 Ngrok 免费 HTTPS 域名
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    # 使用 ngrok 的 http 穿透功能（支持 WebSocket），并在后台绑定你的免费静态域名
    # 替换下面的域名为你获取到的免费域名
    command: "http shadowsocks:8388 --domain=${NGROK_DOMAIN}"
    depends_on:
      - shadowsocks

volumes:
  ollama_data:
